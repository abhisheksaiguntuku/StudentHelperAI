<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 320px;
            padding: 24px;
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }
        h2 {
            font-size: 20px;
            margin: 0 0 24px 0;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-align: center;
        }

        .field {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        .status {
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
        }
        a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h2>Student Helper AI</h2>
    <div style="text-align: center; padding: 20px;">
        <div style="font-size: 48px;">✨</div>
        <div style="margin-top: 10px; font-weight: 600; color: #22c55e;">System Active</div>
        <div style="font-size: 11px; color: #94a3b8; margin-top: 5px;">Ready to solve Google Forms & MCQs</div>
    </div>
    <div style="border-top: 1px solid #334155; margin-top: 10px; padding-top: 10px; font-size: 10px; color: #64748b; text-align: center;">
        No configuration needed. Just open a form!
    </div>
</body>

</html>
